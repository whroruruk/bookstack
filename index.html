<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>whoruruk's Book Stack 📚</title>
    <!-- CSS & Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <!-- Firebase & Google API -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --cloud-dancer: #F0EEE9;
            --silhouette: #2C2C2C;
            --warm-mahogany: #903B31;
            --cool-blue: #93B6CC;
            --pitch-black: #000000;
        }

        body {
            background-color: var(--cloud-dancer);
            color: var(--silhouette);
            font-family: 'Noto Sans KR', sans-serif;
            padding-bottom: 100px;
            line-height: 1.6;
        }

        /* 아날로그 질감 복원 */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.05;
            pointer-events: none;
            background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');
            z-index: 9999;
        }

        .neo-bold { font-family: 'Archivo Black', sans-serif; }

        /* 네오 브루탈리즘 카드 스타일 */
        .neo-card {
            background: white;
            border: 3px solid var(--pitch-black);
            box-shadow: 8px 8px 0px var(--pitch-black);
            transition: all 0.2s ease;
            border-radius: 12px;
        }

        .neo-btn {
            background: white;
            border: 2px solid var(--pitch-black);
            box-shadow: 4px 4px 0px var(--pitch-black);
            padding: 10px 20px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.1s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .neo-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px var(--pitch-black);
        }

        .neo-btn.primary { background: var(--warm-mahogany); color: white; }
        .neo-btn.accent { background: var(--cool-blue); color: var(--silhouette); }

        .search-box {
            width: 100%;
            max-width: 600px;
            border: 3px solid var(--pitch-black);
            padding: 15px 25px;
            font-size: 1.1rem;
            outline: none;
            border-radius: 50px;
            box-shadow: 6px 6px 0px var(--pitch-black);
        }

        /* 도서 목록 그리드 */
        .shelf-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 2.5rem;
        }

        .book-item {
            position: relative;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .book-item:hover { transform: scale(1.05) rotate(1deg); }

        .book-item img {
            width: 100%;
            border: 2px solid var(--pitch-black);
            box-shadow: 4px 4px 0px var(--pitch-black);
            border-radius: 4px;
            aspect-ratio: 2/3;
            object-fit: cover;
        }

        .delete-btn {
            position: absolute;
            top: -10px; right: -10px;
            background: #ff4444;
            color: white;
            border: 2px solid black;
            border-radius: 50%;
            width: 28px; height: 28px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: bold;
            z-index: 10;
            box-shadow: 2px 2px 0px black;
        }

        .sync-banner {
            background: var(--cool-blue);
            border: 2px solid black;
            padding: 10px;
            text-align: center;
            font-weight: bold;
            display: none;
            margin-bottom: 20px;
            animation: slideDown 0.5s ease;
        }

        @keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }

        /* 로딩 애니메이션 */
        .loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--cloud-dancer);
            z-index: 10000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="p-6 md:p-12 lg:p-20">

    <div id="loadingScreen" class="loading-screen">
        <div class="neo-bold text-5xl mb-6 tracking-tighter animate-pulse">DRIVE SYNCING...</div>
        <div class="text-xl font-medium">드라이브에서 예전 기록을 불러오고 있습니다.</div>
    </div>

    <div class="max-w-7xl mx-auto">
        <div id="syncBanner" class="sync-banner">
            ✨ 구글 드라이브 파일과 연결되었습니다.
        </div>

        <header class="flex flex-col lg:flex-row justify-between items-start lg:items-end gap-8 mb-20">
            <div>
                <h1 class="neo-bold text-6xl md:text-8xl tracking-tighter mb-4">BOOK STACK<span>.</span></h1>
                <p class="text-stone-500 text-xl font-medium italic">"쌓여가는 책만큼 깊어지는 whoruruk의 시선" ～</p>
            </div>
            
            <div class="flex gap-4">
                <button id="loginBtn" class="neo-btn primary text-xl px-10 py-4" onclick="handleLogin()">구글 드라이브 연결</button>
                <div id="userProfile" class="flex items-center gap-4" style="display:none;">
                    <button class="neo-btn accent" onclick="manualSync()">🔄 강제 동기화</button>
                    <button class="neo-btn" onclick="handleLogout()">로그아웃</button>
                </div>
            </div>
        </header>

        <main id="mainContent" style="display:none;">
            <!-- 검색 영역 -->
            <section class="mb-24 text-center">
                <div class="relative inline-block w-full max-w-2xl">
                    <input type="text" id="kwInput" class="search-box" placeholder="어떤 책을 더 쌓아볼까요?" onkeypress="if(event.keyCode==13) searchBook()">
                    <button class="absolute right-6 top-1/2 -translate-y-1/2 text-3xl" onclick="searchBook()">🔍</button>
                </div>
                <div id="searchResults" class="flex gap-8 overflow-x-auto py-12 px-4 no-scrollbar min-h-[150px]"></div>
            </section>

            <!-- 통계 및 추가 -->
            <div class="neo-card p-10 mb-16 flex flex-col md:flex-row justify-between items-center bg-white gap-6">
                <div class="text-center md:text-left">
                    <span class="text-stone-400 font-black text-sm uppercase tracking-widest block mb-1">Current Collection</span>
                    <div class="text-6xl neo-bold" id="totalCount">0</div>
                </div>
                <div class="flex gap-4">
                    <button class="neo-btn primary text-xl px-12 py-4" onclick="addShelf()">+ 새로운 책장 추가</button>
                </div>
            </div>

            <!-- 책장 리스트 -->
            <div id="shelfList" class="space-y-20"></div>
        </main>

        <section id="loginMessage" class="text-center py-40 neo-card bg-white">
            <div class="neo-bold text-4xl mb-6 tracking-tight">STORAGE OFFLINE</div>
            <p class="text-stone-500 text-xl mb-12">구글 드라이브에 저장된 기존 `My_BookStack_Data` 를 불러오려면 로그인이 필요합니다.</p>
            <button class="neo-btn primary px-16 py-5 text-2xl" onclick="handleLogin()">드라이브 데이터 연동하기</button>
        </section>
    </div>

    <script>
        // [설정] 알라딘 API 키
        const TTB_KEY = 'ttbtwinwhee0938001';
        const TARGET_FILE_NAME = "My_BookStack_Data_DO_NOT_DELETE";

        // Firebase 초기화
        const firebaseConfig = {
            apiKey: "AIzaSyBfBYodmAEL-lnKfFn8KLXMc7XqCO1w4zw",
            authDomain: "reading-lab-69ea0.firebaseapp.com",
            projectId: "reading-lab-69ea0",
            storageBucket: "reading-lab-69ea0.firebasestorage.app",
            messagingSenderId: "45130148120",
            appId: "1:45130148120:web:96629d86ca19972c6a166d"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let accessToken = null; // 구글 드라이브 접근용 토큰
        let shelves = [];

        // 1. 인증 상태 감시
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('userProfile').style.display = 'flex';
                document.getElementById('mainContent').style.display = 'block';
                document.getElementById('loginMessage').style.display = 'none';
                
                // 로그인 시 세션 저장소에서 토큰 확인
                accessToken = localStorage.getItem('google_access_token');
                
                // 2. 드라이브에서 데이터 자동 검색 및 로드
                if (accessToken) {
                    await syncWithGoogleDrive();
                } else {
                    await loadFromFirestore(); // 토큰 없으면 백업 데이터라도 노출
                }
            } else {
                currentUser = null;
                accessToken = null;
                document.getElementById('loginBtn').style.display = 'block';
                document.getElementById('userProfile').style.display = 'none';
                document.getElementById('mainContent').style.display = 'none';
                document.getElementById('loginMessage').style.display = 'block';
            }
        });

        // 2. 구글 로그인 (드라이브 권한 포함)
        async function handleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            // 드라이브 파일 접근 권한(Scope) 추가
            provider.addScope('https://www.googleapis.com/auth/drive.file');
            
            try {
                const result = await auth.signInWithPopup(provider);
                accessToken = result.credential.accessToken;
                localStorage.setItem('google_access_token', accessToken);
                await syncWithGoogleDrive();
            } catch (error) {
                console.error("Login Error:", error);
                alert("드라이브 연결에 실패했습니다.");
            }
        }

        // 3. 구글 드라이브와 직접 통신하여 파일 찾기 및 읽기
        async function syncWithGoogleDrive() {
            document.getElementById('loadingScreen').style.display = 'flex';
            try {
                // 파일 이름으로 검색
                const searchRes = await fetch(`https://www.googleapis.com/drive/v3/files?q=name='${TARGET_FILE_NAME}'&fields=files(id,name)`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const searchData = await searchRes.json();

                if (searchData.files && searchData.files.length > 0) {
                    const fileId = searchData.files[0].id;
                    // 파일 내용 읽기
                    const contentRes = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
                        headers: { 'Authorization': `Bearer ${accessToken}` }
                    });
                    const content = await contentRes.json();
                    
                    if (Array.isArray(content)) {
                        shelves = content;
                        document.getElementById('syncBanner').style.display = 'block';
                        await saveToFirestore(); // 브라우저 백업용
                        render();
                    }
                } else {
                    console.log("드라이브에 기존 파일이 없습니다. 새로 생성합니다.");
                    await loadFromFirestore();
                }
            } catch (e) {
                console.error("Drive Sync Error:", e);
                // 토큰 만료 시 재로그인 유도
                if (e.status === 401) handleLogin();
            } finally {
                document.getElementById('loadingScreen').style.display = 'none';
            }
        }

        function handleLogout() {
            localStorage.removeItem('google_access_token');
            auth.signOut();
        }

        async function manualSync() {
            if (!accessToken) return handleLogin();
            await syncWithGoogleDrive();
            alert("드라이브 데이터와 동기화되었습니다.");
        }

        // Firestore 백업 로직
        async function saveToFirestore() {
            if (!currentUser) return;
            await db.collection("artifacts").doc("reading-lab").collection("users").doc(currentUser.uid).set({
                shelves: shelves,
                lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
            });
            updateTotal();
        }

        async function loadFromFirestore() {
            const doc = await db.collection("artifacts").doc("reading-lab").collection("users").doc(currentUser.uid).get();
            if (doc.exists) {
                shelves = doc.data().shelves || [];
                render();
            }
        }

        // 알라딘 검색 기능 (CORS 우회)
        async function searchBook() {
            const kw = document.getElementById('kwInput').value;
            if (!kw) return;
            
            const apiUrl = `https://www.aladin.co.kr/ttb/api/ItemSearch.aspx?ttbkey=${TTB_KEY}&Query=${encodeURIComponent(kw)}&QueryType=Keyword&MaxResults=10&output=js&Version=20131101`;
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(apiUrl)}`;

            try {
                const res = await fetch(proxyUrl);
                const raw = await res.json();
                let content = raw.contents.trim();
                if (content.endsWith(';')) content = content.substring(0, content.length - 1);
                const data = JSON.parse(content);
                
                const results = document.getElementById('searchResults');
                results.innerHTML = '';
                data.item.forEach(i => {
                    const book = {
                        title: i.title.replace(/<[^>]*>?/gm, ''),
                        cover: i.cover.replace('coversum', 'cover500'),
                        author: i.author.split('(지은이)')[0],
                        addedDate: new Date().toLocaleDateString()
                    };
                    const div = document.createElement('div');
                    div.className = 'flex-shrink-0 w-36 cursor-pointer book-item';
                    div.innerHTML = `<img src="${book.cover}" loading="lazy"><p class="text-[11px] mt-3 font-bold truncate">${book.title}</p>`;
                    div.onclick = () => { 
                        if(shelves.length === 0) addShelf();
                        shelves[0].books.unshift(book); 
                        saveToFirestore(); render(); 
                    };
                    results.appendChild(div);
                });
            } catch (e) { console.error(e); }
        }

        function render() {
            const container = document.getElementById('shelfList');
            container.innerHTML = '';
            
            shelves.forEach((s, sIdx) => {
                const shelfEl = document.createElement('section');
                shelfEl.className = 'neo-card p-10 bg-white';
                shelfEl.innerHTML = `
                    <div class="flex justify-between items-center mb-12 border-b-4 border-black pb-6">
                        <input type="text" class="neo-bold text-4xl bg-transparent outline-none w-2/3" 
                               style="color:${s.color}" value="${s.title}" 
                               onchange="shelves[${sIdx}].title=this.value; saveToFirestore();">
                        <button onclick="deleteShelf(${sIdx})" class="text-stone-300 hover:text-red-500 font-bold text-sm uppercase tracking-tighter">Remove Stack</button>
                    </div>
                    <div class="shelf-grid">
                        ${s.books.map((b, bIdx) => `
                            <div class="book-item">
                                <button class="delete-btn" onclick="deleteBook(${sIdx}, ${bIdx})">×</button>
                                <img src="${b.cover}" alt="${b.title}" loading="lazy">
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(shelfEl);
            });
            updateTotal();
        }

        function addShelf() {
            const colors = ['#93B6CC', '#903B31', '#2C2C2C', '#6b705c', '#bc6c25'];
            shelves.push({ 
                title: 'MY NEW STACK', 
                books: [], 
                color: colors[Math.floor(Math.random()*colors.length)] 
            });
            saveToFirestore(); render();
        }

        function deleteShelf(idx) {
            if(confirm("이 책장을 삭제할까요?")) { shelves.splice(idx, 1); saveToFirestore(); render(); }
        }

        function deleteBook(sIdx, bIdx) {
            shelves[sIdx].books.splice(bIdx, 1); saveToFirestore(); render();
        }

        function updateTotal() {
            let total = 0;
            shelves.forEach(s => total += s.books.length);
            document.getElementById('totalCount').innerText = total;
        }
    </script>
</body>
</html>
