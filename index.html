<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Stack 📚</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
</head>
<body>
    <div class="container">
        <header>
            <div class="title-container">
                <div style="width: 24px;"><div class="logo-bar" style="width: 100%;"></div><div class="logo-bar" style="width: 60%;"></div><div class="logo-bar" style="width: 85%;"></div></div>
                <h1 class="title">Book Stack<span>.</span></h1>
            </div>
            <div class="header-buttons">
                <span id="syncStatus">준비 중...</span>
                <button id="loginBtn" class="btn btn-new-stack" onclick="handleLogin()">Google 연결</button>
                <div id="userActions" style="display:none; gap:10px; align-items:center;">
                    <button id="logoutBtn" class="btn" onclick="handleLogout()">연결 해제</button>
                    <button class="btn btn-new-stack" onclick="addShelf()">New Stack</button>
                </div>
            </div>
        </header>

        <section id="mainContent" style="display:none;">
            <section class="hero-section">
                <div class="hero-text">
                    <h2>Book Stack 📚</h2>
                    <div class="search-box">
                        <input type="text" id="kwInput" placeholder="새로운 책 검색 및 추가..." onkeypress="if(event.keyCode==13) searchByKeyword()">
                        <span class="clear-btn" onclick="clearSearch()">✕</span>
                        <span style="cursor:pointer; opacity:0.7;" onclick="searchByKeyword()">🔍</span>
                    </div>
                </div>
                <div id="searchResults" class="search-results"></div>
            </section>

            <div class="stats-container collapsed" id="statsBar" onclick="toggleStats(event)">
                <div class="stats-header">
                    <div>
                        <span class="stats-title">STACKS</span>
                        <span style="margin-left:15px; font-weight:900; opacity:0.6;"><span id="totalCount">0</span> TOTAL</span>
                    </div>
                    <button class="stats-toggle-btn">펼치기</button>
                </div>
                <div class="stats-expand-area"><div id="statsShelfList" class="stats-content-layout"></div></div>
            </div>
            <div id="shelfList"></div>
        </section>
        
        <section id="loginMessage" style="text-align:center; padding:100px 0;">
            <p style="color:var(--text-sub); letter-spacing:0.1em;">구글 드라이브와 연결하여 당신만의 **데이터 자립 서재** 를 시작하세요. ✨</p>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
